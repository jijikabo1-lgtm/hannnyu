<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>搬入管理システム</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg: #f1f5f9;
      --card: #fff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --brand: #0ea5e9;
      --brand2: #0284c7;
      --ok: #22c55e;
      --warn: #f97316;
      --danger: #ef4444;
      --shadow: 0 4px 24px rgba(0,0,0,.07);
      --radius: 14px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,'Segoe UI','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── Header ── */
    .hdr{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);color:#fff;padding:0 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 2px 16px rgba(0,0,0,.25);position:sticky;top:0;z-index:200}
    .hdr-logo{font-size:17px;font-weight:800;padding:14px 0;white-space:nowrap}
    .hdr-pdf{display:flex;align-items:center;gap:8px;padding:8px 0}
    .hdr-pdf label{font-size:12px;color:rgba(255,255,255,.65);white-space:nowrap}
    .page-nav{display:flex;align-items:center;gap:6px}
    .page-nav button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:13px;transition:background .15s}
    .page-nav button:hover{background:rgba(255,255,255,.28)}
    .page-nav button:disabled{opacity:.35;cursor:not-allowed}
    .page-lbl{font-size:13px;color:rgba(255,255,255,.8);white-space:nowrap;min-width:80px;text-align:center}
    .conn{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.65);margin-left:auto;padding:8px 0}
    .conn-dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;flex-shrink:0}
    .conn-dot.on{background:#4ade80}
    .conn-dot.off{background:#f87171}

    /* ── Main tabs ── */
    .tabs{background:var(--card);border-bottom:2px solid var(--border);display:flex;gap:2px;padding:0 18px}
    .tab-btn{padding:11px 20px;border:none;background:none;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;border-radius:8px 8px 0 0;transition:all .15s}
    .tab-btn:hover{color:var(--brand);background:#f0f9ff}
    .tab-btn.active{color:var(--brand);border-bottom-color:var(--brand)}
    .tab-pane{display:none}
    .tab-pane.active{display:block}

    /* ── Round tabs ── */
    .rtabs-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:0;overflow-x:auto;position:sticky;top:52px;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .rtab-btn{padding:9px 16px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
    .rtab-btn:hover{color:var(--brand);background:#f0f9ff}
    .rtab-btn.active{color:var(--brand);border-bottom-color:var(--brand)}
    .rtab-del{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:rgba(100,116,139,.15);border:none;cursor:pointer;font-size:10px;color:var(--muted);line-height:1;flex-shrink:0}
    .rtab-del:hover{background:var(--danger);color:#fff}
    .rtab-add{padding:7px 12px;border:1px dashed var(--border);background:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;margin:6px 0 6px 8px;white-space:nowrap;transition:all .15s;flex-shrink:0}
    .rtab-add:hover{border-color:var(--brand);color:var(--brand)}

    /* ── Layout ── */
    .wrap{max-width:1800px;margin:0 auto;padding:14px 18px}
    .map-layout{display:flex;gap:14px;align-items:flex-start}
    .map-col{flex:1;min-width:0}
    .tl-col{width:300px;flex-shrink:0}
    @media(max-width:860px){.map-layout{flex-direction:column}.tl-col{width:100%}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card-hdr{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .card-hdr h2{font-size:14px;font-weight:700}
    .card-body{padding:14px}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn:hover{border-color:#94a3b8;background:#f8fafc}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn-primary:hover{background:var(--brand2);border-color:var(--brand2)}
    .btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}
    .btn-danger:hover{background:#dc2626;border-color:#dc2626}
    .btn-sm{padding:5px 8px;font-size:12px;border-radius:7px}

    /* ── Form ── */
    .field{display:flex;flex-direction:column;gap:4px}
    .field label{font-size:12px;font-weight:600;color:var(--muted)}
    .field input,.field textarea{border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:14px;background:#fff;transition:border-color .15s;width:100%}
    .field input:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
    .field textarea{min-height:64px;resize:vertical}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .fgrid .full{grid-column:1/-1}
    .req{color:var(--danger)}
    @media(max-width:480px){.fgrid{grid-template-columns:1fr}}

    /* ── Stage ── */
    .stage-wrap{position:relative;background:#fff;border-radius:10px;border:1px dashed #cbd5e1;overflow:hidden;aspect-ratio:16/9}
    #stageInner{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0}
    canvas#bg{position:absolute;top:0;left:0;display:block}
    svg#overlay{position:absolute;top:0;left:0;touch-action:none}
    .fs-btn{position:absolute;top:8px;right:8px;z-index:10;background:rgba(15,23,42,.72);color:#fff;border:none;border-radius:7px;padding:6px 11px;cursor:pointer;font-size:12px;font-weight:600;backdrop-filter:blur(4px)}
    .stage-wrap.fullscreen{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1000;border-radius:0;border:none;aspect-ratio:unset}
    .stage-wrap.fullscreen .fs-btn{display:none}
    .stage-wrap.fullscreen.rot90{transform:rotate(90deg);width:100vh;height:100vw;top:calc((100vh - 100vw)/2);left:calc((100vw - 100vh)/2)}
    .stage-wrap.fullscreen.rot180{transform:rotate(180deg)}
    .stage-wrap.fullscreen.rot270{transform:rotate(270deg);width:100vh;height:100vw;top:calc((100vh - 100vw)/2);left:calc((100vw - 100vh)/2)}
    .stage-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.72);color:#fff;padding:5px 13px;border-radius:20px;font-size:12px;pointer-events:none;white-space:nowrap}

    /* ── Timeline panel ── */
    .tl-header{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .tl-header h3{font-size:14px;font-weight:700}
    .tl-cnt{font-size:12px;color:var(--muted)}
    .tl-list{overflow-y:auto;max-height:calc(100vh - 300px);min-height:160px}
    .tl-entry{display:flex;gap:9px;align-items:flex-start;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;border-left:3px solid transparent}
    .tl-entry:last-child{border-bottom:none}
    .tl-entry:hover{background:#f8fafc}
    .tl-entry.overlap{background:#fff7ed;border-left-color:var(--warn)}
    .tl-entry.sel{background:#eff6ff;border-left-color:var(--brand)}
    .tl-num{min-width:20px;height:20px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
    .tl-entry.overlap .tl-num{background:var(--warn)}
    .tl-body{flex:1;min-width:0}
    .tl-time{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
    .tl-items{font-size:12px;color:#374151;margin-top:2px;word-break:break-word}
    .tl-notes{font-size:11px;color:var(--muted);margin-top:1px}
    .tl-date{font-size:11px;color:var(--muted);margin-top:2px}
    .tl-acts{display:flex;gap:3px;flex-shrink:0}
    .ov-badge{font-size:9px;font-weight:700;background:#fff3cd;color:#856404;padding:1px 5px;border-radius:4px;white-space:nowrap}
    .tl-empty{padding:28px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8}

    /* ── List tab table ── */
    .rtable{width:100%;border-collapse:collapse;font-size:13px}
    .rtable th{padding:9px 11px;text-align:left;font-weight:700;background:#f8fafc;border-bottom:2px solid var(--border);white-space:nowrap;color:var(--muted);font-size:12px}
    .rtable td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
    .rtable tr:hover td{background:#f8fafc}
    .rtable tr:last-child td{border-bottom:none}
    .rtable tr.row-ov td{background:#fff7ed}
    .stat-box{background:#f8fafc;border:1px solid var(--border);border-radius:11px;padding:11px 15px;text-align:center;min-width:86px}
    .stat-num{font-size:22px;font-weight:800}
    .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}

    /* ── Modal ── */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:5000;justify-content:center;align-items:center;padding:16px}
    .modal-bg.open{display:flex}
    .modal{background:var(--card);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.28);width:100%;max-width:440px;max-height:92vh;overflow-y:auto}
    .modal-hdr{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-hdr h3{font-size:15px;font-weight:700}
    .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:3px 7px;border-radius:6px;line-height:1}
    .modal-close:hover{background:#f1f5f9}
    .modal-body{padding:18px}
    .modal-footer{padding:13px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

    /* ── Toast & Spinner ── */
    .toast{position:fixed;bottom:20px;right:20px;background:#0f172a;color:#fff;padding:10px 15px;border-radius:11px;box-shadow:var(--shadow);font-size:14px;display:none;max-width:340px;z-index:9999;line-height:1.5}
    .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Fullscreen floating panel ── */
    #fsPanel{display:none;position:fixed;z-index:2000;background:rgba(17,24,39,.88);backdrop-filter:blur(12px);border-radius:18px;padding:10px 16px;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:96vw;cursor:grab;user-select:none;touch-action:none}
    #fsPanel.show{display:flex}
    #fsPanel label{font-size:10px;color:#94a3b8;margin-bottom:2px;display:block}
    #fsPanel .sep{width:1px;height:34px;background:#334155;flex-shrink:0}
    #fsPanel .fsfield{display:flex;flex-direction:column;gap:2px}
    .fscount{font-size:12px;color:#64748b;white-space:nowrap}
    @media(max-width:640px){
      #fsPanel{padding:6px 10px;gap:6px;border-radius:13px}
      #fsPanel label{font-size:9px;margin-bottom:1px}
      #fsPanel .sep{height:24px}
      #fsPanel .btn{padding:6px 9px;min-height:32px;font-size:13px}
      #fsPanel .fscount{font-size:11px}
      #btnExitFs{padding:5px 10px!important;font-size:12px!important}
    }

    /* ── Controls bar ── */
    .ctrl-bar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:9px 13px;border-bottom:1px solid var(--border)}

    /* ── Pin-add mode ── */
    .pin-banner{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:7px 11px;font-size:12px;color:#15803d;font-weight:600;display:none;margin:8px 12px 0;align-items:center;gap:6px;cursor:pointer}
    .pin-banner.show{display:flex}
    .pin-banner:hover{background:#dcfce7}
    .tl-entry.pin-mode{background:#f0fdf4;border-left-color:#22c55e}
    .tl-entry.pin-mode .tl-num{background:#22c55e}
    .btn-pin{background:#f0fdf4;color:#15803d;border-color:#86efac}
    .btn-pin:hover,.btn-pin.active{background:#22c55e;color:#fff;border-color:#22c55e}

    /* Print */
    @media print{.hdr,.tabs,.rtabs-bar,.ctrl-bar,.btn,.toast{display:none!important}.rtable{font-size:11px}}
    /* ── Mobile ── */
    @media(max-width:640px){
      /* Header: 2行レイアウト */
      .hdr{padding:0 10px;gap:6px}
      .hdr-logo{font-size:14px;padding:10px 0}
      .hdr-pdf{flex-wrap:wrap;gap:5px;padding:6px 0;width:100%}
      .hdr-pdf label{font-size:11px}
      .conn{margin-left:0;font-size:11px;padding:6px 0}
      #connLbl{display:none}
      .page-lbl{min-width:55px;font-size:12px}
      .page-nav button{padding:5px 8px;font-size:12px}
      /* Tabs */
      .tabs{padding:0 8px}
      .tab-btn{padding:9px 14px;font-size:13px}
      .rtabs-bar{padding:0 8px;top:46px}
      /* Layout */
      .wrap{padding:8px}
      .map-layout{gap:8px}
      /* Stage: 4:3 on mobile for better portrait view */
      .stage-wrap{aspect-ratio:4/3}
      /* Ctrl bar */
      .ctrl-bar{padding:6px 8px;gap:5px}
      .ctrl-hint{display:none}
      /* Buttons: larger tap targets */
      .btn{padding:10px 13px;min-height:42px;font-size:13px}
      .btn-sm{padding:8px 10px;min-height:36px;font-size:12px}
      /* Timeline */
      .tl-list{max-height:220px}
      .tl-col{position:relative}
      /* Toast: bottom center */
      .toast{left:10px;right:10px;bottom:80px;max-width:none;text-align:center}
      /* Modal: bottom sheet */
      .modal-bg{padding:0;align-items:flex-end}
      .modal{border-radius:18px 18px 0 0;max-height:88vh}
      /* Table */
      .rtable{font-size:12px}
      .rtable th,.rtable td{padding:6px 8px}
      /* Stats */
      .stat-box{min-width:70px;padding:9px 10px}
      .stat-num{font-size:18px}
      /* fullscreen button: more visible */
      .fs-btn{font-size:14px;padding:9px 14px}
    }
    @media(max-width:400px){
      .tab-btn{padding:9px 10px;font-size:12px}
      .hdr-logo{font-size:13px}
    }

    /* FAB: floating add button (mobile only) */
    .fab{display:none;position:fixed;bottom:20px;right:16px;z-index:300;width:52px;height:52px;border-radius:50%;background:var(--brand);color:#fff;border:none;font-size:26px;line-height:1;cursor:pointer;box-shadow:0 4px 16px rgba(14,165,233,.5);align-items:center;justify-content:center;transition:transform .15s}
    .fab:active{transform:scale(.92)}
    @media(max-width:640px){.fab{display:flex}}

    /* Mobile timeline toggle */
    .tl-toggle{display:none;width:100%;background:none;border:none;padding:8px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;text-align:left;border-top:1px solid var(--border)}
    @media(max-width:640px){.tl-toggle{display:flex;align-items:center;justify-content:space-between}}
    .tl-list.collapsed{display:none}

    /* Mobile fullscreen hint banner */
    .fs-hint-banner{display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;font-size:12px;color:#1d4ed8;margin:8px 0 4px;align-items:center;gap:8px}
    @media(max-width:640px){.fs-hint-banner{display:flex}}

    /* cfg warn */
    .cfg-warn{background:#fff7ed;border:1px solid #fed7aa;border-radius:9px;padding:11px 14px;font-size:13px;color:#c2410c;margin-bottom:12px;display:none}
  </style>
</head>
<body>

<!-- ════ HEADER ════ -->
<header class="hdr">
  <div class="hdr-logo">🏗 搬入管理</div>
  <div class="hdr-pdf">
    <label>図面PDF</label>
    <input id="pdfInput" type="file" accept="application/pdf" />
    <span id="pdfShareBadge" style="display:none;font-size:11px;color:#4ade80;font-weight:600;white-space:nowrap"></span>
  </div>
  <div class="page-nav">
    <button id="btnPrev" disabled>◀</button>
    <span class="page-lbl" id="pageInfo">未選択</span>
    <button id="btnNext" disabled>▶</button>
  </div>
  <div class="conn" id="connWrap">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLbl">接続確認中…</span>
  </div>
</header>

<!-- ════ MAIN TABS ════ -->
<div class="tabs">
  <button class="tab-btn active" data-tab="map">📐 図面・搬入</button>
  <button class="tab-btn" data-tab="list">📋 一覧</button>
</div>

<!-- ════ ROUND TABS ════ -->
<div class="rtabs-bar" id="rtabsBar">
  <div id="roundTabs" style="display:flex;align-items:center;flex:1;min-width:0;overflow-x:auto"></div>
  <button class="rtab-add" id="btnAddRound">＋ 階を追加</button>
</div>

<!-- ════ WRAP ════ -->
<div class="wrap">
  <div class="cfg-warn" id="cfgWarn">
    ⚠️ <strong>Supabase 未設定</strong> — ローカルモードで動作中（他端末と共有されません）。
  </div>

  <!-- ── MAP TAB ── -->
  <div class="tab-pane active" id="tab-map">
    <div class="map-layout">

      <!-- Floor plan -->
      <div class="map-col">
        <div class="card">
          <div class="ctrl-bar">
            <button class="btn" id="btnRotL" title="左90°" style="padding:7px 10px;font-size:16px">↺</button>
            <button class="btn" id="btnRotR" title="右90°" style="padding:7px 10px;font-size:16px">↻</button>
            <button class="btn btn-primary" id="btnSaveImg" style="padding:7px 13px">💾 画像保存</button>
            <span class="ctrl-hint" style="font-size:12px;color:var(--muted);margin-left:auto">図面をクリック → 搬入追加</span>
          </div>
          <div class="fs-hint-banner">
            📱 スマホでは <strong>全画面モード</strong> が使いやすいです &nbsp;
            <button class="btn btn-primary btn-sm" onclick="enterFs()" style="margin-left:auto">⛶ 全画面</button>
          </div>
          <div style="padding:10px 12px">
            <div class="stage-wrap" id="stageWrap">
              <div id="stageInner">
                <canvas id="bg"></canvas>
                <svg id="overlay"></svg>
              </div>
              <button class="fs-btn" id="btnFs">⛶ 全画面</button>
              <div class="stage-hint" id="stageHint">PDFをアップロードして図面上をクリック</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div class="tl-col">
        <div class="card" style="position:sticky;top:100px">
          <div class="tl-header">
            <h3>📅 搬入スケジュール</h3>
            <span class="tl-cnt" id="tlCnt">0件</span>
          </div>
          <button class="tl-toggle" id="tlToggle">
            <span>スケジュール一覧</span>
            <span id="tlToggleIcon">▲</span>
          </button>
          <div class="pin-banner" id="pinBanner">📍 ピン追加モード — 図面をクリックしてピンを追加 <span style="margin-left:auto;font-size:11px;opacity:.8">タップでキャンセル</span></div>
          <div class="tl-list" id="tlList">
            <div class="tl-empty">この階の搬入はありません<br><small>図面をクリックして追加</small></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── LIST TAB ── -->
  <div class="tab-pane" id="tab-list">
    <div class="card">
      <div class="card-hdr">
        <h2>📋 搬入一覧（全階）</h2>
        <div style="margin-left:auto;display:flex;gap:7px;flex-wrap:wrap">
          <button class="btn" id="btnCsv">📤 CSV</button>
          <button class="btn" id="btnPrint">🖨 印刷</button>
        </div>
      </div>
      <div class="card-body">
        <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px">
          <div class="stat-box"><div class="stat-num" id="sTotal" style="color:var(--brand)">0</div><div class="stat-lbl">合計</div></div>

<script>
// ══════════════════════════════════════════════════
//  SUPABASE CONFIG  ← あなたのプロジェクト設定を入力
// ══════════════════════════════════════════════════
const SUPABASE_URL      = "https://qbpbxspppzczdfigwkwz.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_cONI0DJVvC1kRlv95CaiNA_t9Cd8kDF";
// ══════════════════════════════════════════════════

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const $ = id => document.getElementById(id);
const esc = s => String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function toast(msg, dur=4000){
  const t=$("toast"); t.textContent=msg; t.style.display="block";

// ── Supabase / localStorage ──
let sb=null, dbUnsub=null, settingsCh=null, usingSupabase=false;
const IS_CFG = SUPABASE_URL !== "https://YOUR_PROJECT_ID.supabase.co";
if(IS_CFG){
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

}else{ showCfgWarn(); }

function setConn(on){
  $("connDot").className="conn-dot "+(on?"on":"off");

}
function showCfgWarn(){ $("cfgWarn").style.display="block"; setConn(false); }

const LS_KEY="delivery_resv_v1";
const LS_ROUNDS_KEY="delivery_rounds_v1";
function lsLoad(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }catch{ return []; } }
function lsSave(a){ localStorage.setItem(LS_KEY,JSON.stringify(a)); }
function lsLoadRounds(){ try{ return JSON.parse(localStorage.getItem(LS_ROUNDS_KEY)||"null")||["1階","2階","3階"]; }catch{ return ["1階","2階","3階"]; } }
function lsSaveRounds(a){
  localStorage.setItem(LS_ROUNDS_KEY,JSON.stringify(a));
  saveSettings(); // Supabaseにも保存
}
const LS_ROT_KEY="delivery_rot_v1";
function lsLoadRot(){ return parseInt(localStorage.getItem(LS_ROT_KEY)||"0",10)||0; }
function lsSaveRot(r){ localStorage.setItem(LS_ROT_KEY,String(r)); }

// ── Settings sync (PDF URL + rounds) ──
let currentPdfUrl=null;

async function saveSettings(extra={}){
  if(!usingSupabase||!sb) return;
  try{
    const row={id:1, rounds:rounds, updated_at:new Date().toISOString()};
    if(extra.pdfUrl)  row.pdf_url  = extra.pdfUrl;
    if(extra.pdfName) row.pdf_name = extra.pdfName;
    const {error}=await sb.from('app_settings').upsert(row);
    if(error) throw error;
  }catch(e){ console.warn("Settings save error:",e); }
}

async function applySettings(data){
  if(!data) return;
  // 階タブの同期
  const newRounds = Array.isArray(data.rounds) ? data.rounds
    : (typeof data.rounds==='string' ? JSON.parse(data.rounds) : null);
  if(newRounds && JSON.stringify(newRounds)!==JSON.stringify(rounds)){
    rounds=newRounds;
    localStorage.setItem(LS_ROUNDS_KEY,JSON.stringify(rounds));
    if(!rounds.includes(curRound)) curRound=rounds[0];
    renderRoundTabs(); redrawOverlay(); updateTimeline();
  }
  // 回転の同期
  if(data.pdf_rotation!=null && data.pdf_rotation!==normalRot){
    normalRot=data.pdf_rotation;
    lsSaveRot(normalRot);
    resizeStage();
  }
  // PDFの同期
  const pdfUrl  = data.pdf_url  || data.pdfUrl  || null;
  const pdfName = data.pdf_name || data.pdfName || null;
  if(pdfUrl && pdfUrl!==currentPdfUrl){
    currentPdfUrl=pdfUrl;
    const badge=$("pdfShareBadge");
    badge.textContent="⬇ 図面を読み込み中…"; badge.style.display="inline";
    try{
      const resp=await fetch(pdfUrl);
      const ab=await resp.arrayBuffer();
      pdfDoc=await pdfjsLib.getDocument({data:ab}).promise;
      pageCount=pdfDoc.numPages; curPage=1;
      await loadPdfPage(curPage); updatePageInfo();
      badge.textContent=`☁ ${pdfName||"図面"}`;
      $("stageHint").style.display="none";
      toast("共有図面を読み込みました");
    }catch(err){
      console.error("PDF fetch error:",err);
      badge.textContent="⚠ 図面の取得に失敗";
    }
  } else if(pdfUrl && pdfUrl===currentPdfUrl){
    $("pdfShareBadge").textContent=`☁ ${pdfName||"図面"}`;
    $("pdfShareBadge").style.display="inline";
  }
}

function subscribeSettings(){
  if(!usingSupabase||!sb) return;
  // 初期取得
  sb.from('app_settings').select('*').eq('id',1).single()
    .then(({data,error})=>{ if(!error&&data) applySettings(data); });
  // リアルタイム更新
  if(settingsCh){ try{ settingsCh.unsubscribe(); }catch{} }
  settingsCh=sb.channel('settings-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'app_settings'},
      ({new:row})=>{ if(row) applySettings(row); })
    .subscribe();
}

// PDFをSupabase Storageにアップロード
async function uploadPdfAndShare(file){
  if(!usingSupabase||!sb){ toast("Supabaseが設定されていません"); return; }
  const badge=$("pdfShareBadge");
  badge.textContent="⬆ アップロード中…"; badge.style.display="inline";
  try{
    const {error:upErr}=await sb.storage.from('floorplans')
      .upload('current.pdf', file, {contentType:'application/pdf', upsert:true});
    if(upErr) throw upErr;
    const {data:urlData}=sb.storage.from('floorplans').getPublicUrl('current.pdf');
    // キャッシュバスター（再アップロード時にブラウザキャッシュを回避）
    const url=urlData.publicUrl+'?t='+Date.now();
    currentPdfUrl=url;
    await saveSettings({pdfUrl:url, pdfName:file.name});
    badge.textContent=`☁ ${file.name}`;
    toast("図面をクラウドに共有しました ☁");
  }catch(err){
    console.error("Upload error:",err);
    badge.textContent="⚠ アップロード失敗";
    toast("アップロードエラー: "+err.message, 8000);
  }
}

// ── State ──
let reservations = [];
let selId = null;
let rounds = lsLoadRounds();
let curRound = rounds[0] || "1階";

// PDF state
let pdfDoc=null, curPage=1, pageCount=0, normalRot=lsLoadRot();
let isFs=false, fsRot=0;
let pdfLoadSeq=0;

// Stage geometry
let stageW=1, stageH=1;
let imgRect={iw:1,ih:1,sc:1,rot:0};

let BW=129, BH=57;
let drag=null, pendingDrag=null;
let pendingBgTap=null, mobilePanning=false;
const DRAG_THR=6;
let addPinMode=null; // エントリIDをセットするとそのエントリにピン追加モードになる

const bgCanvas=$("bg"), ctx=bgCanvas.getContext("2d");
const overlay=$("overlay"), stageWrap=$("stageWrap");

// ── Colors ──
const COLOR_NORMAL="#0ea5e9";
const COLOR_OVERLAP="#f97316";

// ── Round tabs ──
const SOGO_TAB="総合";
function renderRoundTabs(){
  const container=$("roundTabs");
  container.innerHTML="";
  // 総合タブ（削除不可・常に先頭）
  const sogoBtn=document.createElement("button");
  sogoBtn.className="rtab-btn"+(curRound===SOGO_TAB?" active":"");
  sogoBtn.textContent="🗂 総合";
  sogoBtn.addEventListener("click",()=>{ curRound=SOGO_TAB; clearPinMode(); renderRoundTabs(); redrawOverlay(); updateTimeline(); });
  container.appendChild(sogoBtn);
  // 各階タブ
  rounds.forEach((r,i)=>{
    const wrap=document.createElement("div");
    wrap.style.cssText="display:inline-flex;align-items:center";
    const btn=document.createElement("button");
    btn.className="rtab-btn"+(r===curRound?" active":"");
    btn.textContent=r;
    btn.addEventListener("click",()=>{ curRound=r; clearPinMode(); renderRoundTabs(); redrawOverlay(); updateTimeline(); });
    wrap.appendChild(btn);
    if(rounds.length>1){
      const del=document.createElement("button");
      del.className="rtab-del";
      del.title="削除";
      del.textContent="×";
      del.addEventListener("click",e=>{ e.stopPropagation(); confirmDelRound(i); });
      wrap.appendChild(del);
    }
    container.appendChild(wrap);
  });
}

function confirmDelRound(i){
  if(!confirm(`「${rounds[i]}」を削除しますか？\nこの階の搬入データは残ります。`)) return;
  const deleted=rounds[i];
  rounds.splice(i,1);
  if(rounds.length===0) rounds=["1階"];
  if(curRound===deleted) curRound=rounds[0];
  lsSaveRounds(rounds);
  renderRoundTabs(); redrawOverlay(); updateTimeline();
}

$("btnAddRound").addEventListener("click",()=>{
  const n=rounds.length+1;
  let name=`${n}階`;
  while(rounds.includes(name)) name+="′";
  rounds.push(name);
  lsSaveRounds(rounds);
  curRound=name;
  renderRoundTabs(); redrawOverlay(); updateTimeline();
});

// ── Time overlap detection ──
function hasTimeOverlap(r1,r2){
  if(!r1.timeStart||!r2.timeStart) return false;
  const s1=r1.timeStart, e1=r1.timeEnd||"23:59";
  const s2=r2.timeStart, e2=r2.timeEnd||"23:59";
  return s1<e2 && s2<e1;
}
function getOverlapIds(arr){
  const set=new Set();
  for(let i=0;i<arr.length;i++){
    for(let j=i+1;j<arr.length;j++){
      if(hasTimeOverlap(arr[i],arr[j])){ set.add(arr[i].id); set.add(arr[j].id); }
    }
  }
  return set;
}

// ── Stage resize ──
function resizeStage(){
  const dpr=window.devicePixelRatio||1;
  let cssW,cssH;
  if(isFs&&(fsRot===90||fsRot===270)){ cssW=window.innerHeight; cssH=window.innerWidth; }
  else if(isFs){ cssW=window.innerWidth; cssH=window.innerHeight; }
  else{ const r=stageWrap.getBoundingClientRect(); cssW=Math.max(1,Math.round(r.width)); cssH=Math.max(1,Math.round(r.height)); }
  stageW=cssW; stageH=cssH;
  // モバイルでは吹き出しを画面サイズに合わせて縮小
  const _bs=Math.min(1,stageW/900);
  BW=Math.max(70,Math.round(129*_bs)); BH=Math.max(40,Math.round(57*_bs));
  bgCanvas.width=Math.round(cssW*dpr); bgCanvas.height=Math.round(cssH*dpr);
  bgCanvas.style.width=cssW+"px"; bgCanvas.style.height=cssH+"px";
  overlay.style.width=cssW+"px"; overlay.style.height=cssH+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  overlay.setAttribute("viewBox",`0 0 ${stageW} ${stageH}`);
  redrawBg(); redrawOverlay();
}
window.addEventListener("resize",resizeStage);

// ── Background drawing ──
function drawGrid(){
  ctx.clearRect(0,0,stageW,stageH);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,stageW,stageH);
  ctx.strokeStyle="#e8edf2"; ctx.lineWidth=1;
  for(let x=0;x<stageW;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,stageH);ctx.stroke(); }
  for(let y=0;y<stageH;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(stageW,y);ctx.stroke(); }
  ctx.fillStyle="#94a3b8"; ctx.font="14px system-ui,sans-serif"; ctx.textAlign="center";
  ctx.fillText("PDFをアップロードしてください",stageW/2,stageH/2);
  imgRect={iw:stageW,ih:stageH,sc:1,rot:0};
}
function drawImageFit(img){
  const rot=isFs?0:normalRot;
  const iw=img.width,ih=img.height,cw=stageW,ch=stageH;
  const swapped=(rot===90||rot===270);
  const sc=Math.min(cw/(swapped?ih:iw),ch/(swapped?iw:ih));
  imgRect={iw,ih,sc,rot};
  ctx.clearRect(0,0,cw,ch); ctx.fillStyle="#fff"; ctx.fillRect(0,0,cw,ch);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality="high";
  if(rot===0){
    const dw=iw*sc,dh=ih*sc; ctx.drawImage(img,0,0,iw,ih,(cw-dw)/2,(ch-dh)/2,dw,dh);
  } else {
    ctx.save(); ctx.translate(cw/2,ch/2); ctx.rotate(rot*Math.PI/180);
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality="high";
    ctx.drawImage(img,0,0,iw,ih,-iw*sc/2,-ih*sc/2,iw*sc,ih*sc); ctx.restore();
  }
}

// ── Coordinate conversion ──
function canvasPxToImgRatio(px,py){
  const {iw,ih,sc,rot}=imgRect;
  const cx=px-stageW/2, cy=py-stageH/2;
  const rad=-rot*Math.PI/180, cos=Math.cos(rad), sin=Math.sin(rad);
  const lx=(cx*cos-cy*sin)/sc, ly=(cx*sin+cy*cos)/sc;
  return {x:lx/iw+0.5, y:ly/ih+0.5};
}
function imgRatioToCanvasPx(rx,ry){
  const {iw,ih,sc,rot}=imgRect;
  const lx=(rx-0.5)*iw, ly=(ry-0.5)*ih;
  const rad=rot*Math.PI/180, cos=Math.cos(rad), sin=Math.sin(rad);
  return {x:(lx*cos-ly*sin)*sc+stageW/2, y:(lx*sin+ly*cos)*sc+stageH/2};
}
function svgPtFromEvent(e){
  const rot=isFs?fsRot:0;
  if(rot===0){ const r=overlay.getBoundingClientRect(); return {x:(e.clientX-r.left)*(stageW/r.width), y:(e.clientY-r.top)*(stageH/r.height)}; }
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  let dx=e.clientX-cx, dy=e.clientY-cy;
  const rad=-rot*Math.PI/180, cos=Math.cos(rad), sin=Math.sin(rad);
  return {x:dx*cos-dy*sin+stageW/2, y:dx*sin+dy*cos+stageH/2};
}
function redrawBg(){ if(!pdfDoc||!pdfDoc._curImg){ drawGrid(); return; } drawImageFit(pdfDoc._curImg); }

// ── PDF loading ──
$("pdfInput").addEventListener("change",async e=>{
  const file=e.target.files[0]; if(!file) return;
  try{
    toast("PDFを読み込んでいます…");
    const ab=await file.arrayBuffer();
    pdfDoc=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
    pageCount=pdfDoc.numPages; curPage=1;
    await loadPdfPage(curPage);
    updatePageInfo();
    toast(`PDF読み込み完了（${pageCount}ページ）`);
    $("stageHint").style.display="none";
    // Supabaseが使えるなら自動共有
    if(usingSupabase) uploadPdfAndShare(file);
  }catch(err){ toast("PDF読み込みエラー: "+err.message); }
});
async function loadPdfPage(n){
  if(!pdfDoc) return;
  const mySeq=++pdfLoadSeq;
  const page=await pdfDoc.getPage(n);
  if(mySeq!==pdfLoadSeq) return;
  const vp1=page.getViewport({scale:1,rotation:0});
  const scale=clamp(200/72, 0.5, 10000/Math.max(vp1.width,vp1.height));
  const vp=page.getViewport({scale,rotation:0});
  const tmp=document.createElement("canvas");
  tmp.width=Math.max(1,Math.floor(vp.width)); tmp.height=Math.max(1,Math.floor(vp.height));
  const tmpCtx=tmp.getContext("2d",{alpha:false});
  tmpCtx.fillStyle="#ffffff"; tmpCtx.fillRect(0,0,tmp.width,tmp.height);
  await page.render({canvasContext:tmpCtx,viewport:vp,intent:"print"}).promise;
  if(mySeq!==pdfLoadSeq) return;
  const img=new Image(); img.src=tmp.toDataURL("image/png");
  await new Promise(res=>{ img.onload=res; });
  if(mySeq!==pdfLoadSeq) return;
  pdfDoc._curImg=img; resizeStage();
}
function updatePageInfo(){
  if(!pdfDoc){ $("pageInfo").textContent="未選択"; $("btnPrev").disabled=true; $("btnNext").disabled=true; return; }
  $("pageInfo").textContent=`${curPage}/${pageCount}p`;
  $("btnPrev").disabled=curPage<=1; $("btnNext").disabled=curPage>=pageCount;
  $("fsPageInfo").textContent=`${curPage}/${pageCount}`;
  $("fsCnt").textContent=getRoundRes().length+"件";
}
async function goPage(n){ curPage=n; await loadPdfPage(n); updatePageInfo(); redrawOverlay(); }
$("btnPrev").addEventListener("click",()=>{ if(curPage>1) goPage(curPage-1); });
$("btnNext").addEventListener("click",()=>{ if(curPage<pageCount) goPage(curPage+1); });
$("fsBtnPrev").addEventListener("click",()=>{ if(curPage>1) goPage(curPage-1); });
$("fsBtnNext").addEventListener("click",()=>{ if(curPage<pageCount) goPage(curPage+1); });

// ── Rotation ──
$("btnRotL").addEventListener("click",()=>{ normalRot=(normalRot-90+360)%360; lsSaveRot(normalRot); saveSettings({pdf_rotation:normalRot}); resizeStage(); });
$("btnRotR").addEventListener("click",()=>{ normalRot=(normalRot+90)%360; lsSaveRot(normalRot); saveSettings({pdf_rotation:normalRot}); resizeStage(); });
$("fsBtnRotL").addEventListener("click",()=>{ fsRot=(fsRot-90+360)%360; normalRot=fsRot; lsSaveRot(normalRot); saveSettings({pdf_rotation:normalRot}); applyFsRotClass(); resizeStage(); });
$("fsBtnRotR").addEventListener("click",()=>{ fsRot=(fsRot+90)%360; normalRot=fsRot; lsSaveRot(normalRot); saveSettings({pdf_rotation:normalRot}); applyFsRotClass(); resizeStage(); });
function applyFsRotClass(){
  stageWrap.classList.remove("rot90","rot180","rot270");
  if(fsRot===90) stageWrap.classList.add("rot90");
  else if(fsRot===180) stageWrap.classList.add("rot180");
  else if(fsRot===270) stageWrap.classList.add("rot270");
}

// ── Fullscreen ──
let panelPos=null, panelDrag=null;
$("btnFs").addEventListener("click",enterFs);
$("btnExitFs").addEventListener("click",exitFs);
window.addEventListener("keydown",e=>{ if(e.key==="Escape"&&isFs){ drag=null; pendingDrag=null; exitFs(); e.preventDefault(); } });
function enterFs(){
  stageWrap.classList.add("fullscreen"); $("btnFs").textContent="✕ 閉じる";
  isFs=true; fsRot=normalRot; applyFsRotClass(); resetVT(); // normalRotを引き継ぐ・VTリセット
  $("fsPanel").classList.add("show"); panelPos=null;
  resizeStage(); setTimeout(setPanelDefault,100);
}
function exitFs(){
  drag=null; pendingDrag=null; resetVT(); // ドラッグ中に解除した場合に備えてリセット
  stageWrap.classList.remove("fullscreen","rot90","rot180","rot270");
  $("btnFs").textContent="⛶ 全画面"; isFs=false;
  normalRot=fsRot; lsSaveRot(normalRot); saveSettings({pdf_rotation:normalRot}); // 全画面中の回転を保存
  fsRot=0;
  $("fsPanel").classList.remove("show"); stageWrap.style.aspectRatio="16/9";
  resizeStage();
  // 全画面時の大きなピクセルオフセットを通常キャンバスサイズに合わせてクランプし直す
  getRoundRes().forEach(res=>{
    const markers=getMarkers(res);
    if(!markers.length) return;
    const a0=imgRatioToCanvasPx(markers[0].x,markers[0].y);
    const rawDx=res.bubbleDx??24, rawDy=res.bubbleDy??-52;
    const bOffX=(Math.abs(rawDx)<1&&rawDx!==0)?rawDx*imgRect.iw*imgRect.sc:rawDx;
    const bOffY=(Math.abs(rawDy)<1&&rawDy!==0)?rawDy*imgRect.ih*imgRect.sc:rawDy;
    res.bubbleDx=clamp(a0.x+bOffX,-(BW*0.4),stageW-(BW*0.6))-a0.x;
    res.bubbleDy=clamp(a0.y+bOffY,-(BH*0.4),stageH-(BH*0.6))-a0.y;
  });
  redrawOverlay();
}
function setPanelDefault(){
  const p=$("fsPanel"), pw=p.offsetWidth||600, ph=p.offsetHeight||80;
  panelPos={x:Math.round((window.innerWidth-pw)/2), y:window.innerHeight-ph-24}; applyPanelPos();
}
function applyPanelPos(){
  if(!panelPos) return;
  const p=$("fsPanel"), pw=p.offsetWidth, ph=p.offsetHeight;
  p.style.left=clamp(panelPos.x,0,window.innerWidth-pw)+"px";
  p.style.top=clamp(panelPos.y,0,window.innerHeight-ph)+"px";
  p.style.bottom="auto"; p.style.transform="none";
}
$("fsPanel").addEventListener("pointerdown",e=>{
  if(e.target.tagName==="BUTTON") return;
  if(!isFs) return; e.stopPropagation();
  const r=$("fsPanel").getBoundingClientRect();
  panelDrag={sx:e.clientX,sy:e.clientY,px:panelPos?panelPos.x:r.left,py:panelPos?panelPos.y:r.top};
  if(!panelPos) panelPos={x:r.left,y:r.top};
  $("fsPanel").setPointerCapture(e.pointerId); e.preventDefault();
});
$("fsPanel").addEventListener("pointermove",e=>{
  if(!panelDrag) return;
  panelPos={x:panelDrag.px+(e.clientX-panelDrag.sx), y:panelDrag.py+(e.clientY-panelDrag.sy)};
  applyPanelPos(); e.preventDefault();
});
$("fsPanel").addEventListener("pointerup",e=>{
  if(panelDrag){ try{ $("fsPanel").releasePointerCapture(e.pointerId); }catch(_){} }
  panelDrag=null; e.preventDefault();
});
window.addEventListener("resize",()=>{ if(isFs){ panelPos=null; setTimeout(setPanelDefault,50); } });

// ── SVG helper ──
function mk(tag,attrs={}){
  const el=document.createElementNS(svgNS,tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,String(v));
  return el;
}

// ── マーカー配列を取得（旧 markerX/Y との互換）──
function getMarkers(res){
  if(res.markers&&res.markers.length>0) return res.markers;
  if(res.markerX!=null) return [{x:res.markerX,y:res.markerY}];
  return [];
}

// ── 現階のエントリを取得（作成日時昇順 → 番号が安定）──
function getRoundRes(){
  // 総合タブは全階を表示
  const arr=curRound===SOGO_TAB
    ? [...reservations]
    : reservations.filter(r=>(r.round||rounds[0])===curRound);
  arr.sort((a,b)=>{
    const ta=a.createdAt?.seconds??(typeof a.createdAt==='number'?a.createdAt/1000:0);
    const tb=b.createdAt?.seconds??(typeof b.createdAt==='number'?b.createdAt/1000:0);
    return ta-tb;
  });
  return arr;
}

// ── Overlay rendering ──
function redrawOverlay(){
  while(overlay.firstChild) overlay.removeChild(overlay.firstChild);
  const hit=mk("rect",{x:0,y:0,width:stageW,height:stageH,fill:"transparent","pointer-events":"all"});
  overlay.appendChild(hit);

  const arr=getRoundRes();
  const overlapIds=getOverlapIds(arr);
  // FS時はCSS回転しているので番号テキストを反回転させる。通常モードは回転なし
  const fsRotNow=isFs?fsRot:0;

  arr.forEach((res,idx)=>{
    const markers=getMarkers(res);
    if(!markers.length) return;

    const isSel=res.id===selId;
    const isPinTarget=res.id===addPinMode;
    const isOv=overlapIds.has(res.id);
    const color=isPinTarget?"#22c55e":isOv?COLOR_OVERLAP:COLOR_NORMAL;
    const g=mk("g",{"data-id":res.id});

    // 吹き出し位置：第0ピンからのキャンバスpxオフセット
    const a0=imgRatioToCanvasPx(markers[0].x,markers[0].y);
    // 旧形式（絶対値<1の比率値）は自動変換、新形式はpxそのまま
    const rawDx=res.bubbleDx??24, rawDy=res.bubbleDy??-52;
    const bOffX=(Math.abs(rawDx)<1&&rawDx!==0)?rawDx*imgRect.iw*imgRect.sc:rawDx;
    const bOffY=(Math.abs(rawDy)<1&&rawDy!==0)?rawDy*imgRect.ih*imgRect.sc:rawDy;
    // 全画面解除等でキャンバスサイズが変わってもはみ出さないようクランプ
    const bx=clamp(a0.x+bOffX,-(BW*0.4),stageW-(BW*0.6));
    const by=clamp(a0.y+bOffY,-(BH*0.4),stageH-(BH*0.6));
    const bcx=bx+BW/2, bcy=by+BH/2;

    // 各ピンを描画
    markers.forEach((m,mi)=>{
      const a=imgRatioToCanvasPx(m.x,m.y);
      const ax=a.x, ay=a.y;

      // ピン→吹き出し中心へ線
      g.appendChild(mk("line",{x1:ax,y1:ay,x2:bcx,y2:bcy,
        stroke:color,"stroke-width":1.8,"stroke-opacity":0.75,"stroke-dasharray":"4 2"}));

      // アンカー円
      const anc=mk("circle",{cx:ax,cy:ay,r:9,fill:color,
        stroke:isSel?"#0ea5e9":"white","stroke-width":isSel?3:2,cursor:"pointer"});
      anc.setAttribute("data-role","anchor");
      anc.setAttribute("data-mi",String(mi));
      g.appendChild(anc);

      // 番号テキスト：FS回転時は逆回転して常に正立させる
      const an=mk("text",{x:ax,y:ay+4.5,"text-anchor":"middle",
        "font-size":"10","font-weight":"800",fill:"white","pointer-events":"none"});
      if(fsRotNow!==0) an.setAttribute("transform",`rotate(${-fsRotNow},${ax},${ay})`);
      an.textContent=String(idx+1);
      g.appendChild(an);

      // 選択中 & 複数ピンある時：右上に削除バッジ
      if(isSel && markers.length>1){
        const db=mk("circle",{cx:ax+8,cy:ay-8,r:7,fill:"#ef4444",
          stroke:"white","stroke-width":1.5,cursor:"pointer"});
        db.setAttribute("data-role","pin-del");
        db.setAttribute("data-mi",String(mi));
        g.appendChild(db);
        const dx=mk("text",{x:ax+8,y:ay-8+3.5,"text-anchor":"middle",
          "font-size":"9","font-weight":"900",fill:"white","pointer-events":"none"});
        dx.textContent="×";
        g.appendChild(dx);
      }
    });

    // 吹き出し（FS回転時は逆回転で正立）
    const bubTr=fsRotNow===0
      ?`translate(${bx},${by})`
      :`translate(${bx},${by}) rotate(${-fsRotNow},${BW/2},${BH/2})`;
    const bg2=mk("g",{transform:bubTr,cursor:"pointer"});
    bg2.setAttribute("data-role","bubble");
    // 内部SVGでviewBoxスケーリング（テキスト等は常に172×75座標系で記述、BW/BHで表示サイズ制御）
    const bInner=mk("svg",{x:0,y:0,width:BW,height:BH,viewBox:"0 0 172 75",overflow:"visible"});
    bInner.appendChild(mk("rect",{x:2,y:2,width:170,height:73,rx:11,fill:"rgba(0,0,0,0.07)"}));
    bInner.appendChild(mk("rect",{x:0,y:0,width:172,height:75,rx:11,fill:"white",
      stroke:isSel?"#0ea5e9":color,"stroke-width":isSel?2.5:1.5}));
    bInner.appendChild(mk("rect",{x:0,y:0,width:5,height:75,rx:3,fill:color}));

    const t1=mk("text",{x:12,y:19,"font-size":"13","font-weight":"800",fill:"#0f172a"});
    const pinCount=markers.length>1?` [${markers.length}]`:"";
    const it=(res.items||"").length>16?(res.items||"").slice(0,16)+"…":(res.items||"未入力");
    t1.textContent=`${idx+1}${pinCount}. ${it}`; bInner.appendChild(t1);

    const t2=mk("text",{x:12,y:32,"font-size":"12",fill:"#374151"});
    t2.textContent=`${res.round||rounds[0]}  ${res.deliveryDate||"日付未設定"}`; bInner.appendChild(t2);

    const t3=mk("text",{x:12,y:45,"font-size":"12",fill:"#6b7280"});
    t3.textContent=res.timeStart?(res.timeStart+(res.timeEnd?"〜"+res.timeEnd:"")):"時間未設定";
    bInner.appendChild(t3);

    const t4=mk("text",{x:12,y:61,"font-size":"11",fill:"#64748b"});
    const notesTxt=res.notes?(res.notes.length>24?res.notes.slice(0,24)+"…":res.notes):"";
    t4.textContent=notesTxt?"備考: "+notesTxt:"";
    bInner.appendChild(t4);

    if(isOv){
      bInner.appendChild(mk("rect",{x:126,y:4,width:42,height:16,rx:8,fill:"#fff3cd"}));
      const ovt=mk("text",{x:147,y:15,"text-anchor":"middle","font-size":"9","font-weight":"700",fill:"#856404"});
      ovt.textContent="時間重複"; bInner.appendChild(ovt);
    }
    bg2.appendChild(bInner);
    g.appendChild(bg2);
    overlay.appendChild(g);
  });
  $("fsCnt").textContent=arr.length+"件";
  $("fsPageInfo").textContent=pdfDoc?`${curPage}/${pageCount}`:"-";
}

// ── Pointer events ──
overlay.addEventListener("pointerdown",e=>{
  if(e.button===2) return;
  const groupEl=e.target.closest("g[data-id]");
  const roleEl=e.target.closest("[data-role]");
  if(groupEl){
    const id=groupEl.getAttribute("data-id");
    selId=id; redrawOverlay(); updateTimeline();
    if(roleEl){
      const res=reservations.find(r=>r.id===id);
      if(res){
        const role=roleEl.getAttribute("data-role");
        // ピン削除バッジをタップ
        if(role==="pin-del"){
          const mi=parseInt(roleEl.getAttribute("data-mi")||"0");
          deletePinFromEntry(id,mi);
          e.preventDefault(); return;
        }
        const p=svgPtFromEvent(e);
        if(role==="anchor"){
          const mi=parseInt(roleEl.getAttribute("data-mi")||"0");
          const markers=getMarkers(res);
          const _a=imgRatioToCanvasPx(markers[mi]?.x??0, markers[mi]?.y??0);
          const rawDx=res.bubbleDx??24, rawDy=res.bubbleDy??-52;
          const bOffX=(Math.abs(rawDx)<1&&rawDx!==0)?rawDx*imgRect.iw*imgRect.sc:rawDx;
          const bOffY=(Math.abs(rawDy)<1&&rawDy!==0)?rawDy*imgRect.ih*imgRect.sc:rawDy;
          pendingDrag={id,role,mi,startX:p.x,startY:p.y,
            baseAnchorX:_a.x,baseAnchorY:_a.y,
            baseDx:bOffX,baseDy:bOffY,
            pointerId:e.pointerId};
        } else {
          const markers=getMarkers(res);
          const a0=markers.length?imgRatioToCanvasPx(markers[0].x,markers[0].y):{x:0,y:0};
          const rawDx=res.bubbleDx??24, rawDy=res.bubbleDy??-52;
          const bOffX=(Math.abs(rawDx)<1&&rawDx!==0)?rawDx*imgRect.iw*imgRect.sc:rawDx;
          const bOffY=(Math.abs(rawDy)<1&&rawDy!==0)?rawDy*imgRect.ih*imgRect.sc:rawDy;
          // クランプ済みの実際の表示位置からドラッグ開始（FS解除後のはみ出し対策）
          const clampedDx=clamp(a0.x+bOffX,-(BW*0.4),stageW-(BW*0.6))-a0.x;
          const clampedDy=clamp(a0.y+bOffY,-(BH*0.4),stageH-(BH*0.6))-a0.y;
          pendingDrag={id,role,mi:0,startX:p.x,startY:p.y,
            baseAnchorX:a0.x,baseAnchorY:a0.y,
            baseDx:clampedDx,baseDy:clampedDy,
            pointerId:e.pointerId};
        }
        overlay.setPointerCapture(e.pointerId);
      }
    }
    e.preventDefault();
  } else {
    const p=svgPtFromEvent(e);
    if(addPinMode){
      addPinToEntry(addPinMode,p.x,p.y);
      e.preventDefault();
    } else if(e.pointerType==="touch"){
      // モバイル：パン操作か確認してからフォームを開く
      pendingBgTap={x:p.x,y:p.y,pointerId:e.pointerId};
      e.preventDefault();
    } else {
      openNewForm(p.x,p.y);
      e.preventDefault();
    }
  }
});
overlay.addEventListener("pointermove",e=>{
  if(pendingDrag&&!drag){
    const p=svgPtFromEvent(e);
    if(Math.hypot(p.x-pendingDrag.startX,p.y-pendingDrag.startY)>=DRAG_THR){ drag=pendingDrag; pendingDrag=null; }
  }
  if(!drag) return;
  const res=reservations.find(r=>r.id===drag.id); if(!res) return;
  const p=svgPtFromEvent(e), rawDx=p.x-drag.startX, rawDy=p.y-drag.startY;
  if(drag.role==="anchor"){
    const np={x:clamp(drag.baseAnchorX+rawDx,0,stageW), y:clamp(drag.baseAnchorY+rawDy,0,stageH)};
    const r=canvasPxToImgRatio(np.x,np.y);
    const markers=getMarkers(res);
    markers[drag.mi]={x:clamp(r.x,0,1),y:clamp(r.y,0,1)};
    res.markers=markers;
    if(drag.mi===0){ res.markerX=markers[0].x; res.markerY=markers[0].y; }
  } else if(drag.role==="bubble"){
    // rawDx/rawDy は svgPtFromEvent がすでにキャンバス座標に変換済み（FS回転補正含む）
    // normalRot はキャンバスの描画回転であり CSS 回転ではないため、ここでは追加補正不要
    res.bubbleDx=clamp(drag.baseDx+rawDx,-stageW,stageW);
    res.bubbleDy=clamp(drag.baseDy+rawDy,-stageH,stageH);
  }
  redrawOverlay(); e.preventDefault();
});
overlay.addEventListener("pointerup",async e=>{
  // モバイル背景タップ：パンしていなければフォームを開く
  if(pendingBgTap&&e.pointerId===pendingBgTap.pointerId){
    if(!mobilePanning) openNewForm(pendingBgTap.x,pendingBgTap.y);
    pendingBgTap=null; mobilePanning=false;
  }
  if(pendingDrag){
    try{ overlay.releasePointerCapture(pendingDrag.pointerId); }catch(_){}
    showDetail(pendingDrag.id); pendingDrag=null;
  }
  if(drag){
    try{ overlay.releasePointerCapture(drag.pointerId); }catch(_){}
    const res=reservations.find(r=>r.id===drag.id);
    if(res) await saveRes(res,false);
    drag=null;
  }
  e.preventDefault();
});

// ── Add pin to existing entry ──
async function addPinToEntry(id, canX, canY){
  const res=reservations.find(r=>r.id===id); if(!res) return;
  const r=canvasPxToImgRatio(canX,canY);
  const markers=getMarkers(res);
  markers.push({x:clamp(r.x,0,1),y:clamp(r.y,0,1)});
  res.markers=markers;
  await saveRes(res,false);
  toast("ピンを追加しました 📍");
}

// ── Delete individual pin from entry ──
async function deletePinFromEntry(id, mi){
  const res=reservations.find(r=>r.id===id); if(!res) return;
  const markers=getMarkers(res);
  if(markers.length<=1){ toast("最後のピンは削除できません"); return; }
  markers.splice(mi,1);
  res.markers=markers;
  // 第0ピンが変わった場合はlegacyフィールドも更新
  res.markerX=markers[0].x; res.markerY=markers[0].y;
  await saveRes(res,false);
  toast("ピンを削除しました");
}

// ── Timeline ──
function updateTimeline(){
  // オーバーレイと番号を一致させるため createdAt 順のインデックスマップを先に作る
  const baseArr=getRoundRes(); // createdAt 昇順 → 図面上の番号と一致
  const numMap=new Map(baseArr.map((r,i)=>[r.id,i+1]));

  // 表示は日付・時間順にソート
  const arr=baseArr.slice().sort((a,b)=>{
    const sd=(a.deliveryDate||"").localeCompare(b.deliveryDate||"");
    return sd!==0?sd:(a.timeStart||"").localeCompare(b.timeStart||"");
  });
  const ovIds=getOverlapIds(arr);
  const container=$("tlList");
  $("tlCnt").textContent=arr.length+"件";
  if(arr.length===0){
    container.innerHTML=`<div class="tl-empty">${curRound===SOGO_TAB?"搬入データはありません":"この階の搬入はありません"}<br><small>図面をクリックして追加</small></div>`;
    return;
  }
  container.innerHTML="";
  arr.forEach((res)=>{
    const isOv=ovIds.has(res.id), isSel=res.id===selId;
    const div=document.createElement("div");
    div.className="tl-entry"+(isOv?" overlap":"")+(isSel?" sel":"");
    div.dataset.id=res.id;
    const isPinTgt=res.id===addPinMode;
    const pinCount=getMarkers(res).length;
    if(isPinTgt) div.classList.add("pin-mode");
    const num=numMap.get(res.id)??"-";
    div.innerHTML=`
      <div class="tl-num">${num}</div>
      <div class="tl-body">
        <div class="tl-time">
          ${esc(res.timeStart||"--:--")} 〜 ${esc(res.timeEnd||"--:--")}
          ${isOv?'<span class="ov-badge">重複</span>':""}
        </div>
        ${curRound===SOGO_TAB?`<div style="font-size:11px;font-weight:700;color:#0ea5e9;margin-bottom:2px">${esc(res.round||rounds[0])}</div>`:""}
        <div class="tl-items">${esc(res.items||"-")}</div>
        ${res.notes?`<div class="tl-notes">${esc(res.notes)}</div>`:""}
        <div class="tl-date">${esc(res.deliveryDate||"-")}${pinCount>1?` <span style="color:#0ea5e9;font-size:11px">📍×${pinCount}</span>`:""}</div>
      </div>
      <div class="tl-acts">
        <button class="btn btn-sm btn-pin${isPinTgt?" active":""}" data-act="pin" title="ピン追加">📍</button>
        <button class="btn btn-sm" data-act="edit" title="編集">✏</button>
        <button class="btn btn-sm btn-danger" data-act="del" title="削除">🗑</button>
      </div>`;
    div.addEventListener("click",e2=>{
      const act=e2.target.closest("[data-act]")?.dataset.act;
      if(act==="pin"){
        addPinMode=addPinMode===res.id?null:res.id;
        const banner=$("pinBanner");
        if(addPinMode){ banner.classList.add("show"); } else { banner.classList.remove("show"); }
        if(addPinMode){ selId=res.id; }
        updateTimeline(); redrawOverlay(); return;
      }
      if(act==="edit"){ openEditForm(res.id); return; }
      if(act==="del"){ confirmDel(res.id); return; }
      selId=res.id; redrawOverlay(); updateTimeline();
    });
    container.appendChild(div);
  });
}

// ── List tab table ──
function renderTable(){
  const tbody=$("resTbody");
  // 表示順：階タブ順 → 日付 → 開始時刻
  const tabOrder=[...rounds];
  const allArr=[...reservations].sort((a,b)=>{
    const ia=tabOrder.indexOf(a.round||rounds[0]), ib=tabOrder.indexOf(b.round||rounds[0]);
    if(ia!==ib) return ia-ib;
    const sd=(a.deliveryDate||"").localeCompare(b.deliveryDate||"");
    return sd!==0?sd:(a.timeStart||"").localeCompare(b.timeStart||"");
  });
  // 図面番号マップ：階ごとに createdAt 昇順で採番（図面と一致）
  const floorNumMap=new Map();
  rounds.forEach(rnd=>{
    const arr=reservations.filter(r=>(r.round||rounds[0])===rnd)
      .slice().sort((a,b)=>{
        const ta=a.createdAt?.seconds??(typeof a.createdAt==='number'?a.createdAt/1000:0);
        const tb=b.createdAt?.seconds??(typeof b.createdAt==='number'?b.createdAt/1000:0);
        return ta-tb;
      });
    arr.forEach((r,i)=>floorNumMap.set(r.id,i+1));
  });
  const allOvIds=new Set();
  rounds.forEach(rnd=>{ getOverlapIds(reservations.filter(r=>(r.round||rounds[0])===rnd)).forEach(id=>allOvIds.add(id)); });
  if(!allArr.length){ tbody.innerHTML=`<tr><td colspan="8" style="text-align:center;padding:28px;color:var(--muted)">データはありません</td></tr>`; return; }
  tbody.innerHTML=allArr.map(r=>`<tr class="${allOvIds.has(r.id)?"row-ov":""}">
    <td style="font-weight:700;color:var(--muted)">${floorNumMap.get(r.id)??"-"}</td>

// ── Supabase / LS CRUD ──
async function fetchAllReservations(){
  const {data,error}=await sb.from('reservations')
    .select('id,data,created_at').order('created_at',{ascending:false});
  if(error){ console.error(error); setConn(false); reservations=lsLoad(); onDataUpdate(); return; }
  setConn(true);
  reservations=data.map(r=>({
    ...r.data, id:r.id,
    createdAt: r.data.createdAt ?? new Date(r.created_at).getTime()
  }));
  onDataUpdate();
}
async function loadReservations(){
  if(usingSupabase){
    await fetchAllReservations();
    // リアルタイム購読
    if(dbUnsub){ try{ dbUnsub.unsubscribe(); }catch{} }
    dbUnsub=sb.channel('reservations-changes')
      .on('postgres_changes',{event:'*',schema:'public',table:'reservations'},
        ()=>fetchAllReservations())
      .subscribe();
    subscribeSettings();
  } else {
    reservations=lsLoad(); onDataUpdate();
  }
}
async function saveRes(data,isNew=true){
  if(usingSupabase){
    try{
      if(isNew){
        const newId=crypto.randomUUID
          ? crypto.randomUUID()
          : 'id_'+Date.now()+'_'+Math.random().toString(16).slice(2);
        data.id=newId; data.createdAt=Date.now();
        const {error}=await sb.from('reservations').insert({
          id:newId, data:data,
          created_at:new Date(data.createdAt).toISOString()
        });
        if(error) throw error;
        // ローカルに即時反映
        reservations.unshift(data);
      } else {
        const {error}=await sb.from('reservations').update({data:data}).eq('id',data.id);
        if(error) throw error;
        // ローカルに即時反映
        const i=reservations.findIndex(r=>r.id===data.id);
        if(i>=0) reservations[i]=data; else reservations.unshift(data);
      }
      onDataUpdate();
    }catch(e){ console.error(e); toast("保存エラー: "+e.message); }
  } else {
    const arr=lsLoad();
    if(isNew){ data.id="ls_"+Date.now()+"_"+Math.random().toString(16).slice(2); data.createdAt=Date.now(); arr.unshift(data); }
    else { const i=arr.findIndex(r=>r.id===data.id); if(i>=0)arr[i]=data; else arr.unshift(data); }
    lsSave(arr); reservations=arr; onDataUpdate();
  }
}
function clearPinMode(){
  addPinMode=null;
  $("pinBanner").classList.remove("show");
}
async function deleteRes(id){
  if(selId===id) selId=null;
  if(addPinMode===id) clearPinMode();
  if(usingSupabase){
    try{
      const {error}=await sb.from('reservations').delete().eq('id',id);
      if(error) throw error;
      // ローカルに即時反映
      reservations=reservations.filter(r=>r.id!==id);
      onDataUpdate();
    }catch(e){ toast("削除エラー: "+e.message); }
  } else { const arr=lsLoad().filter(r=>r.id!==id); lsSave(arr); reservations=arr; onDataUpdate(); }
}

// 15分刻みの時刻選択肢を生成（既存の非15分刻み値も選択肢に追加）
function buildTimeSelect(fieldId, selected){
  const el=$(fieldId);
  const opts=['<option value="">--:--</option>'];
  const slots=[];
  for(let h=0;h<24;h++) for(let m=0;m<60;m+=15) slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
  // 既存値が15分刻み以外なら選択肢に追加
  if(selected && !slots.includes(selected)) slots.push(selected);
  slots.sort();
  slots.forEach(v=>opts.push(`<option value="${v}"${v===selected?' selected':''}>${v}</option>`));
  el.innerHTML=opts.join('');
}

function buildRoundSelect(selected){
  // 総合タブ時はデフォルトを最初の階にする
  const def=curRound===SOGO_TAB?rounds[0]:curRound;

// ── PNG export ──
async function saveImage(){
  const btn=$("btnSaveImg"); btn.disabled=true; btn.textContent="⏳ 生成中…";
  try{
    const scale=2;
    const out=document.createElement("canvas");
    out.width=stageW*scale; out.height=stageH*scale;
    const octx=out.getContext("2d");
    octx.fillStyle="#ffffff"; octx.fillRect(0,0,out.width,out.height);
    octx.drawImage(bgCanvas,0,0,out.width,out.height);

    const arr=getRoundRes();
    const ovIds=getOverlapIds(arr);

    arr.forEach((res,idx)=>{
      const markers=getMarkers(res);
      if(!markers.length) return;
      const isOv=ovIds.has(res.id), isSel=res.id===selId;
      const color=isOv?COLOR_OVERLAP:COLOR_NORMAL;

      // Bubble canvas position (pixel offset from first anchor)
      const a0=imgRatioToCanvasPx(markers[0].x,markers[0].y);
      const rawDx=res.bubbleDx??24, rawDy=res.bubbleDy??-52;
      const bOffX=(Math.abs(rawDx)<1&&rawDx!==0)?rawDx*imgRect.iw*imgRect.sc:rawDx;
      const bOffY=(Math.abs(rawDy)<1&&rawDy!==0)?rawDy*imgRect.ih*imgRect.sc:rawDy;
      // キャンバス範囲内にクランプしてからscaleをかける
      const bx=clamp(a0.x+bOffX,-(BW*0.4),stageW-(BW*0.6))*scale;
      const by=clamp(a0.y+bOffY,-(BH*0.4),stageH-(BH*0.6))*scale;
      const bw=BW*scale, bh=BH*scale, bcx=bx+bw/2, bcy=by+bh/2;

      // Draw each anchor pin + line to bubble
      markers.forEach(m=>{
        const _a=imgRatioToCanvasPx(m.x,m.y);
        const ax=_a.x*scale, ay=_a.y*scale;
        octx.beginPath(); octx.moveTo(ax,ay); octx.lineTo(bcx,bcy);
        octx.strokeStyle=color; octx.lineWidth=1.8*scale; octx.globalAlpha=0.75;
        octx.setLineDash([4*scale,2*scale]); octx.stroke(); octx.setLineDash([]); octx.globalAlpha=1;
        octx.beginPath(); octx.arc(ax,ay,9*scale,0,Math.PI*2);
        octx.fillStyle=color; octx.fill();
        octx.strokeStyle=isSel?"#0ea5e9":"white"; octx.lineWidth=isSel?3*scale:2*scale; octx.stroke();
        octx.fillStyle="#fff"; octx.textAlign="center"; octx.textBaseline="middle";
        octx.font=`bold ${10*scale}px system-ui,sans-serif`;
        octx.fillText(String(idx+1),ax,ay);
      });

      // Draw bubble
      octx.fillStyle="rgba(0,0,0,0.07)"; roundRect(octx,bx+2*scale,by+2*scale,bw,bh,11*scale); octx.fill();
      octx.fillStyle="#fff"; roundRect(octx,bx,by,bw,bh,11*scale); octx.fill();
      octx.strokeStyle=isSel?"#0ea5e9":color; octx.lineWidth=isSel?2.5*scale:1.5*scale; octx.stroke();
      octx.fillStyle=color; roundRect(octx,bx,by,5*scale,bh,3*scale); octx.fill();

      // Multi-pin badge
      if(markers.length>1){
        const bR=8*scale;
        octx.beginPath(); octx.arc(bx+bw-bR,by+bR,bR,0,Math.PI*2);
        octx.fillStyle="#0ea5e9"; octx.fill();
        octx.fillStyle="#fff"; octx.textAlign="center"; octx.textBaseline="middle";
        octx.font=`bold ${8*scale}px system-ui,sans-serif`;
        octx.fillText(String(markers.length),bx+bw-bR,by+bR);
      }

      octx.fillStyle="#0f172a"; octx.textAlign="left"; octx.textBaseline="alphabetic";
      octx.font=`bold ${10*scale}px system-ui,sans-serif`;
      const it=(res.items||"").length>19?(res.items||"").slice(0,19)+"…":(res.items||"未入力");
      octx.fillText(`${idx+1}. ${it}`,bx+12*scale,by+19*scale);

      octx.fillStyle="#374151"; octx.font=`${10*scale}px system-ui,sans-serif`;
      octx.fillText(`${res.round||rounds[0]}  ${res.deliveryDate||"日付未設定"}`,bx+12*scale,by+32*scale);

      octx.fillStyle="#6b7280";
      octx.fillText(res.timeStart?(res.timeStart+(res.timeEnd?"〜"+res.timeEnd:"")):"時間未設定",bx+12*scale,by+45*scale);

      if(res.notes){
        const notesTxt=res.notes.length>24?res.notes.slice(0,24)+"…":res.notes;
        octx.fillStyle="#64748b"; octx.font=`${9*scale}px system-ui,sans-serif`;
        octx.fillText("備考: "+notesTxt,bx+12*scale,by+61*scale);
      }

      if(isOv){
        octx.fillStyle="#fff3cd"; roundRect(octx,bx+(BW-46)*scale,by+4*scale,42*scale,16*scale,8*scale); octx.fill();
        octx.fillStyle="#856404"; octx.textAlign="center"; octx.textBaseline="middle";
        octx.font=`bold ${8*scale}px system-ui,sans-serif`;
        octx.fillText("時間重複",bx+(BW-25)*scale,by+12*scale);
      }
    });

    const dt=new Date().toLocaleDateString("ja-JP");
    octx.fillStyle="rgba(100,116,139,0.6)"; octx.textAlign="right"; octx.textBaseline="bottom";
    octx.font=`${11*scale}px system-ui,sans-serif`;
    octx.fillText(`搬入図面 ${curRound}${pdfDoc?" P."+curPage+"/"+pageCount:""} ${dt}`,out.width-8*scale,out.height-6*scale);

    out.toBlob(blob=>{
      if(!blob){ toast("画像生成に失敗しました"); return; }
      const a=document.createElement("a");
      a.download=`搬入図面_${curRound}${pdfDoc?"_P"+curPage:""}_${new Date().toISOString().slice(0,10)}.png`;
      a.href=URL.createObjectURL(blob); a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
      toast("画像を保存しました 📷");
    },"image/png");
  }catch(e){ console.error(e); toast("保存エラー: "+e.message); }
  finally{ btn.disabled=false; btn.textContent="💾 画像保存"; }
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// ── Map Pan / Pinch-Zoom ──
const stageInner=$("stageInner");
let vtScale=1,vtTx=0,vtTy=0;
const VT_MIN=0.5,VT_MAX=4;
function applyVT(){ stageInner.style.transform=`translate(${vtTx}px,${vtTy}px) scale(${vtScale})`; }
function resetVT(){ vtScale=1;vtTx=0;vtTy=0;applyVT(); }
function clampVT(){
  if(vtScale<=1){ vtTx=0;vtTy=0;return; }
  const mx=stageW*(vtScale-1),my=stageH*(vtScale-1);
  vtTx=clamp(vtTx,-mx,0); vtTy=clamp(vtTy,-my,0);
}
let _tp1=null,_tp2=null,_tpan=false,_lastTap=0;
stageWrap.addEventListener('touchstart',e=>{
  if(isFs) return;
  if(e.touches.length>=2){
    e.preventDefault();
    const a=e.touches[0],b=e.touches[1];
    _tp1={x:a.clientX,y:a.clientY};
    _tp2={x:b.clientX,y:b.clientY,
      dist:Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY),
      scale:vtScale,tx:vtTx,ty:vtTy,
      cx:(a.clientX+b.clientX)/2,cy:(a.clientY+b.clientY)/2};
    _tpan=false; pendingBgTap=null;
  } else if(e.touches.length===1){
    const t=e.touches[0];
    const onEl=document.elementFromPoint(t.clientX,t.clientY);
    if(onEl&&onEl.closest("g[data-id]")){ _tp1=null; return; }
    _tp1={x:t.clientX,y:t.clientY,tx:vtTx,ty:vtTy};
    _tp2=null; _tpan=false;
    // ダブルタップでズームリセット
    const now=Date.now();
    if(now-_lastTap<280){ resetVT(); e.preventDefault(); }
    _lastTap=now;
  }
},{passive:false});
stageWrap.addEventListener('touchmove',e=>{
  if(isFs) return;
  if(e.touches.length>=2&&_tp2){
    e.preventDefault();
    const a=e.touches[0],b=e.touches[1];
    const dist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
    const newScale=clamp(_tp2.scale*(dist/_tp2.dist),VT_MIN,VT_MAX);
    const rect=stageWrap.getBoundingClientRect();
    const lcx=_tp2.cx-rect.left,lcy=_tp2.cy-rect.top;
    vtTx=lcx-(lcx-_tp2.tx)*(newScale/_tp2.scale);
    vtTy=lcy-(lcy-_tp2.ty)*(newScale/_tp2.scale);
    const ncx=(a.clientX+b.clientX)/2,ncy=(a.clientY+b.clientY)/2;
    vtTx+=ncx-_tp2.cx; vtTy+=ncy-_tp2.cy;
    vtScale=newScale; _tp2.cx=ncx; _tp2.cy=ncy;
    applyVT();
  } else if(e.touches.length===1&&_tp1&&!_tp2){
    const t=e.touches[0];
    const dx=t.clientX-_tp1.x,dy=t.clientY-_tp1.y;
    if(!_tpan&&Math.hypot(dx,dy)>8){ _tpan=true; mobilePanning=true; pendingBgTap=null; }
    if(_tpan){
      e.preventDefault();
      vtTx=_tp1.tx+dx; vtTy=_tp1.ty+dy;
      clampVT(); applyVT();
    }
  }
},{passive:false});
stageWrap.addEventListener('touchend',e=>{
  if(isFs) return;
  if(e.touches.length===0){
    if(_tpan){ clampVT(); applyVT(); }
    _tp1=null; _tp2=null; _tpan=false;
    setTimeout(()=>{ mobilePanning=false; },50);
  } else if(e.touches.length===1){
    _tp2=null;
    const t=e.touches[0];
    _tp1={x:t.clientX,y:t.clientY,tx:vtTx,ty:vtTy};
    _tpan=false;
  }
},{passive:false});
